version: "3.8"

services:
  frontend:
    # image: ghcr.io/liita-lod/query-interface/frontend:latest
    # pull_policy: always
    build: apps/frontend
    ports:
      - "3032:8000"
    configs:
      - source: config.toml
        target: /config.toml
    environment:
      - SERVER_CONFIG_FILE=/config.toml
    restart: unless-stopped

  sparql-proxy:
    image: nginx:alpine
    ports:
      - "3033:3033"
    volumes:
      - ./nginx-sparql-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    
configs:
  config.toml:
    content: |
      [general]
      host = "0.0.0.0"
      port = 8000
      log-level = "info"
